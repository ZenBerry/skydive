<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skydive</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap");

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: "Roboto", sans-serif;
    }

    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: #fff;
      cursor: default;
    }

    #world {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }

    .text-node {
      position: absolute;
      min-width: 12px;
      min-height: 1em;
      line-height: 1.25;
      color: #111;
      white-space: pre;
      width: max-content;
      max-width: none;
      overflow-wrap: normal;
      word-break: keep-all;
      user-select: none;
      cursor: grab;
      outline: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      isolation: isolate;
    }

    .text-node.selected {
      outline: 1px solid rgba(29, 78, 216, 0.5);
      outline-offset: 2px;
    }

    .text-node.editing {
      user-select: text;
      cursor: text;
    }

    .internal-link {
      color: #6b7280;
      text-decoration: underline;
      cursor: pointer;
    }

    .text-node.editing .internal-link {
      cursor: text;
    }

    .text-node.navigation-target-highlight {
      animation: destination-text-glow 5000ms linear forwards;
    }

    @keyframes destination-text-glow {
      0% {
        text-shadow:
          0 0 0 rgba(255, 255, 255, 0),
          0 0 0 rgba(255, 255, 255, 0),
          0 0 0 rgba(255, 255, 255, 0);
      }
      16% {
        text-shadow:
          0 0 0.22em rgba(255, 255, 255, 0.98),
          0 0 0.56em rgba(255, 255, 255, 0.9),
          0 0 1.28em rgba(255, 255, 255, 0.72);
      }
      74% {
        text-shadow:
          0 0 0.26em rgba(255, 255, 255, 0.88),
          0 0 0.66em rgba(255, 255, 255, 0.74),
          0 0 1.38em rgba(255, 255, 255, 0.52);
      }
      100% {
        text-shadow:
          0 0 0.36em rgba(255, 255, 255, 0),
          0 0 0.9em rgba(255, 255, 255, 0),
          0 0 1.7em rgba(255, 255, 255, 0);
      }
    }

    #node-context-menu {
      position: fixed;
      z-index: 1000;
      min-width: 190px;
      padding: 6px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.12);
      display: grid;
      gap: 4px;
    }

    #node-context-menu[hidden] {
      display: none;
    }

    #node-context-menu button {
      border: 0;
      background: transparent;
      padding: 8px 10px;
      text-align: left;
      border-radius: 6px;
      font: 500 14px/1.2 "Roboto", sans-serif;
      color: #111;
      cursor: pointer;
    }

    #node-context-menu button:hover:not(:disabled) {
      background: #f2f4f7;
    }

    #node-context-menu button:disabled {
      color: #999;
      cursor: not-allowed;
    }

    #marquee-selection {
      position: absolute;
      z-index: 430;
      border: 1px solid #2563eb;
      background: rgba(37, 99, 235, 0.16);
      pointer-events: none;
    }

    #marquee-selection[hidden] {
      display: none;
    }

    #group-selection-box {
      position: absolute;
      z-index: 420;
      border: 1px solid #1d4ed8;
      background: rgba(29, 78, 216, 0.05);
      cursor: move;
      touch-action: none;
      box-sizing: border-box;
    }

    #group-selection-box[hidden] {
      display: none;
    }

    #group-selection-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      right: -7px;
      bottom: -7px;
      border: 1px solid #fff;
      background: #1d4ed8;
      box-sizing: border-box;
      cursor: nwse-resize;
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="world"></div>
    <div id="marquee-selection" hidden></div>
    <div id="group-selection-box" hidden>
      <div id="group-selection-handle"></div>
    </div>
  </div>
  <div id="node-context-menu" hidden>
    <button id="copy-node-id-btn" type="button">Copy node ID</button>
    <button id="link-selection-btn" type="button">Link selection to node ID...</button>
  </div>
  <input id="open-file-input" type="file" accept=".mind.json,.json,application/json" hidden>

  <script>
    const viewport = document.getElementById("viewport");
    const world = document.getElementById("world");
    const marqueeSelection = document.getElementById("marquee-selection");
    const groupSelectionBox = document.getElementById("group-selection-box");
    const groupSelectionHandle = document.getElementById("group-selection-handle");
    const openFileInput = document.getElementById("open-file-input");
    const nodeContextMenu = document.getElementById("node-context-menu");
    const copyNodeIdBtn = document.getElementById("copy-node-id-btn");
    const linkSelectionBtn = document.getElementById("link-selection-btn");

    const BASE_TEXT_PX = 28;
    const ZOOM_SENSITIVITY = 0.012;
    const NAVIGATION_VIEWPORT_FILL = 0.98;
    const MIN_NAVIGATION_SCALE = 0.08;
    const MARQUEE_DRAG_THRESHOLD_PX = 3;
    const GROUP_SELECTION_PADDING_PX = 8;
    const STORAGE_KEY = "mindmap.v1";
    const FILE_TYPES = [{
      description: "Mind Map JSON",
      accept: { "application/json": [".mind.json", ".json"] }
    }];

    let fileHandle = null;
    let saveTimer = null;
    let suppressAutosave = false;
    let nextNodeNumber = 1;
    let cameraAnimationFrame = null;
    let contextMenuNode = null;
    let contextMenuSelectionRange = null;
    let marqueeSession = null;
    let groupTransform = null;
    let selectionBoundsWorld = null;
    const nodeHighlightTimeouts = new WeakMap();
    const selectedNodes = new Set();

    const camera = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      scale: 1
    };

    function getNodeById(nodeId) {
      const id = typeof nodeId === "string" ? nodeId.trim() : "";
      if (!id) return null;
      for (const node of world.children) {
        if (node.dataset.nodeId === id) return node;
      }
      return null;
    }

    function updateNextNodeNumberFromId(nodeId) {
      const match = /^node-(\d+)$/.exec(nodeId);
      if (!match) return;
      const value = Number(match[1]);
      if (!Number.isFinite(value)) return;
      nextNodeNumber = Math.max(nextNodeNumber, value + 1);
    }

    function isNodeIdInUse(nodeId) {
      return Boolean(getNodeById(nodeId));
    }

    function generateNodeId() {
      let candidate = `node-${nextNodeNumber}`;
      while (isNodeIdInUse(candidate)) {
        nextNodeNumber += 1;
        candidate = `node-${nextNodeNumber}`;
      }
      nextNodeNumber += 1;
      return candidate;
    }

    function resolveNodeId(preferredId) {
      const requested = typeof preferredId === "string" ? preferredId.trim() : "";
      if (!requested) return generateNodeId();
      if (!isNodeIdInUse(requested)) {
        updateNextNodeNumberFromId(requested);
        return requested;
      }
      let suffix = 2;
      let candidate = `${requested}-${suffix}`;
      while (isNodeIdInUse(candidate)) {
        suffix += 1;
        candidate = `${requested}-${suffix}`;
      }
      return candidate;
    }

    function sanitizeNodeHtml(rawHtml) {
      if (typeof rawHtml !== "string" || rawHtml.length === 0) return "";

      const source = document.createElement("div");
      source.innerHTML = rawHtml;
      const output = document.createElement("div");

      function walk(node, target) {
        if (node.nodeType === Node.TEXT_NODE) {
          target.appendChild(document.createTextNode(node.textContent || ""));
          return;
        }

        if (node.nodeType !== Node.ELEMENT_NODE) return;
        const element = node;
        const tag = element.tagName;

        if (tag === "BR") {
          target.appendChild(document.createElement("br"));
          return;
        }

        if (tag === "SPAN" && element.classList.contains("internal-link")) {
          const targetId = (element.dataset.targetId || "").trim();
          if (targetId) {
            const link = document.createElement("span");
            link.className = "internal-link";
            link.dataset.targetId = targetId;
            link.textContent = element.textContent || "";
            target.appendChild(link);
            return;
          }
        }

        for (const child of element.childNodes) {
          walk(child, target);
        }
      }

      for (const child of source.childNodes) {
        walk(child, output);
      }
      return output.innerHTML;
    }

    function normalizeNodeMarkup(node) {
      const cleanHtml = sanitizeNodeHtml(node.innerHTML);
      if (node.innerHTML !== cleanHtml) {
        node.innerHTML = cleanHtml;
      }
    }

    function getSelectionRangeWithinNode(node) {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) return null;
      const range = selection.getRangeAt(0);
      if (range.collapsed) return null;
      if (!node.contains(range.startContainer) || !node.contains(range.endContainer)) return null;
      if (!range.toString()) return null;
      return range.cloneRange();
    }

    async function copyTextToClipboard(text) {
      if (!text) throw new Error("Nothing to copy.");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "true");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(textarea);
      if (!ok) throw new Error("Copy command failed.");
    }

    function closeNodeContextMenu() {
      contextMenuNode = null;
      contextMenuSelectionRange = null;
      nodeContextMenu.hidden = true;
    }

    function openNodeContextMenu(node, clientX, clientY) {
      contextMenuNode = node;
      contextMenuSelectionRange = getSelectionRangeWithinNode(node);
      linkSelectionBtn.disabled = !contextMenuSelectionRange;
      nodeContextMenu.hidden = false;

      const menuRect = nodeContextMenu.getBoundingClientRect();
      const clampedX = Math.min(clientX, window.innerWidth - menuRect.width - 8);
      const clampedY = Math.min(clientY, window.innerHeight - menuRect.height - 8);
      nodeContextMenu.style.left = `${Math.max(8, clampedX)}px`;
      nodeContextMenu.style.top = `${Math.max(8, clampedY)}px`;
    }

    function cancelCameraAnimation() {
      if (cameraAnimationFrame !== null) {
        cancelAnimationFrame(cameraAnimationFrame);
        cameraAnimationFrame = null;
      }
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function easeInOutHeavy(t) {
      if (t < 0.5) {
        return 16 * Math.pow(t, 5);
      }
      return 1 - Math.pow(-2 * t + 2, 5) / 2;
    }

    function getNodeWorldSize(node) {
      const scale = camera.scale > 0 ? camera.scale : 1;
      const rect = node.getBoundingClientRect();
      const widthPx = Math.max(rect.width, node.scrollWidth, node.offsetWidth, 1);
      const heightPx = Math.max(rect.height, node.scrollHeight, node.offsetHeight, 1);
      return {
        width: widthPx / scale,
        height: heightPx / scale
      };
    }

    function getNodeIntrinsicWorldSize(node) {
      const baseFontSizeRaw = Number(node.dataset.baseFontSize);
      const baseFontSize = Number.isFinite(baseFontSizeRaw) && baseFontSizeRaw > 0
        ? baseFontSizeRaw
        : BASE_TEXT_PX;

      const probe = node.cloneNode(true);
      probe.classList.remove("selected", "navigation-target-highlight", "editing");
      probe.contentEditable = "false";

      // Measure in a hidden probe at scale 1 to avoid viewport/layout floors (for example min-width).
      probe.style.position = "fixed";
      probe.style.left = "-100000px";
      probe.style.top = "-100000px";
      probe.style.visibility = "hidden";
      probe.style.pointerEvents = "none";
      probe.style.minWidth = "0";
      probe.style.minHeight = "0";
      probe.style.width = "max-content";
      probe.style.maxWidth = "none";
      probe.style.fontSize = `${baseFontSize}px`;

      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      probe.remove();

      return {
        width: Math.max(0.001, rect.width),
        height: Math.max(0.001, rect.height)
      };
    }

    function getNodeFitScale(nodeWorldSize) {
      const viewWidth = Math.max(1, viewport.clientWidth);
      const scaleByWidth = (viewWidth * NAVIGATION_VIEWPORT_FILL) / nodeWorldSize.width;
      // Width-driven zoom makes short/long single-line nodes scale predictably.
      const targetScale = scaleByWidth;
      return Math.max(MIN_NAVIGATION_SCALE, targetScale);
    }

    function getNavigationDuration(targetX, targetY, targetScale) {
      const dx = targetX - camera.x;
      const dy = targetY - camera.y;
      const panDistance = Math.hypot(dx, dy);
      const viewportDiagonal = Math.max(1, Math.hypot(viewport.clientWidth, viewport.clientHeight));
      const panFactor = clamp(panDistance / viewportDiagonal, 0, 2);
      const scaleFactor = clamp(Math.abs(Math.log(targetScale / camera.scale)), 0, 2);
      const duration = 620 + panFactor * 200 + scaleFactor * 220;
      return clamp(duration, 620, 1300);
    }

    function highlightNavigationTarget(node, durationMs = 5000) {
      const previousTimeout = nodeHighlightTimeouts.get(node);
      if (previousTimeout) clearTimeout(previousTimeout);
      node.classList.remove("navigation-target-highlight");
      void node.offsetWidth;
      node.classList.add("navigation-target-highlight");
      const timeoutId = setTimeout(() => {
        node.classList.remove("navigation-target-highlight");
        nodeHighlightTimeouts.delete(node);
      }, durationMs);
      nodeHighlightTimeouts.set(node, timeoutId);
    }

    function animateCameraTo(targetX, targetY, targetScale, durationMs = 760, onComplete = null) {
      cancelCameraAnimation();
      const startX = camera.x;
      const startY = camera.y;
      const startScale = camera.scale;
      const start = performance.now();

      function tick(now) {
        const elapsed = now - start;
        const t = Math.min(1, elapsed / durationMs);
        const eased = easeInOutHeavy(t);
        camera.x = startX + (targetX - startX) * eased;
        camera.y = startY + (targetY - startY) * eased;
        camera.scale = startScale + (targetScale - startScale) * eased;
        render();
        if (t < 1) {
          cameraAnimationFrame = requestAnimationFrame(tick);
        } else {
          cameraAnimationFrame = null;
          scheduleAutosave();
          if (typeof onComplete === "function") onComplete();
        }
      }

      cameraAnimationFrame = requestAnimationFrame(tick);
    }

    function focusNodeFullScreen(node) {
      const nodeWorldSize = getNodeIntrinsicWorldSize(node);
      const targetScale = getNodeFitScale(nodeWorldSize);

      const nodeX = Number.isFinite(Number(node.dataset.x)) ? Number(node.dataset.x) : 0;
      const nodeY = Number.isFinite(Number(node.dataset.y)) ? Number(node.dataset.y) : 0;
      const nodeCenterWorldX = nodeX + nodeWorldSize.width / 2;
      const nodeCenterWorldY = nodeY + nodeWorldSize.height / 2;
      const viewWidth = Math.max(1, viewport.clientWidth);
      const viewHeight = Math.max(1, viewport.clientHeight);
      const targetX = viewWidth / 2 - nodeCenterWorldX * targetScale;
      const targetY = viewHeight / 2 - nodeCenterWorldY * targetScale;
      const duration = getNavigationDuration(targetX, targetY, targetScale);

      // highlightNavigationTarget(node);
      animateCameraTo(targetX, targetY, targetScale, duration);
    }

    function linkSelectionToTarget(node, selectionRange, targetNodeId) {
      if (!selectionRange) {
        throw new Error("Select a word first.");
      }
      if (!node.contains(selectionRange.startContainer) || !node.contains(selectionRange.endContainer)) {
        throw new Error("Selection must stay inside one node.");
      }

      const text = selectionRange.toString();
      if (!text.trim()) {
        throw new Error("Selection is empty.");
      }

      const link = document.createElement("span");
      link.className = "internal-link";
      link.dataset.targetId = targetNodeId;
      link.textContent = text;

      selectionRange.deleteContents();
      selectionRange.insertNode(link);
    }

    function isEditableTarget(target) {
      if (!(target instanceof HTMLElement)) return false;
      if (target.isContentEditable) return true;
      const tag = target.tagName;
      return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
    }

    function getActiveEditingNode() {
      for (const node of world.children) {
        if (node instanceof HTMLElement && node.classList.contains("editing")) {
          return node;
        }
      }
      return null;
    }

    function deactivateEditingNodeOnOutsidePointerDown(target) {
      const editingNode = getActiveEditingNode();
      if (!editingNode) return;
      if (target instanceof Node && editingNode.contains(target)) return;
      editingNode.blur();
    }

    function getScreenRectBetweenPoints(startX, startY, endX, endY) {
      const left = Math.min(startX, endX);
      const top = Math.min(startY, endY);
      const right = Math.max(startX, endX);
      const bottom = Math.max(startY, endY);
      return {
        left,
        top,
        right,
        bottom,
        width: right - left,
        height: bottom - top
      };
    }

    function renderMarqueeRect(rect) {
      marqueeSelection.hidden = false;
      marqueeSelection.style.left = `${rect.left}px`;
      marqueeSelection.style.top = `${rect.top}px`;
      marqueeSelection.style.width = `${rect.width}px`;
      marqueeSelection.style.height = `${rect.height}px`;
    }

    function hideMarqueeRect() {
      marqueeSelection.hidden = true;
    }

    function getNodesIntersectingScreenRect(rect) {
      const matches = [];
      for (const node of world.children) {
        if (!(node instanceof HTMLElement)) continue;
        const nodeRect = node.getBoundingClientRect();
        const intersects =
          nodeRect.right >= rect.left &&
          nodeRect.left <= rect.right &&
          nodeRect.bottom >= rect.top &&
          nodeRect.top <= rect.bottom;
        if (intersects) matches.push(node);
      }
      return matches;
    }

    function applySelectionNodeClasses() {
      for (const node of world.children) {
        if (!(node instanceof HTMLElement)) continue;
        node.classList.toggle("selected", selectedNodes.has(node));
      }
    }

    function renderGroupSelectionBox() {
      if (selectedNodes.size === 0 || !selectionBoundsWorld) {
        groupSelectionBox.hidden = true;
        return;
      }

      const left = camera.x + selectionBoundsWorld.minX * camera.scale - GROUP_SELECTION_PADDING_PX;
      const top = camera.y + selectionBoundsWorld.minY * camera.scale - GROUP_SELECTION_PADDING_PX;
      const width = selectionBoundsWorld.width * camera.scale + GROUP_SELECTION_PADDING_PX * 2;
      const height = selectionBoundsWorld.height * camera.scale + GROUP_SELECTION_PADDING_PX * 2;

      groupSelectionBox.hidden = false;
      groupSelectionBox.style.left = `${left}px`;
      groupSelectionBox.style.top = `${top}px`;
      groupSelectionBox.style.width = `${width}px`;
      groupSelectionBox.style.height = `${height}px`;
    }

    function refreshSelectionBounds() {
      if (selectedNodes.size === 0) {
        selectionBoundsWorld = null;
        renderGroupSelectionBox();
        return;
      }

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      for (const node of selectedNodes) {
        if (!world.contains(node)) continue;
        const x = Number(node.dataset.x);
        const y = Number(node.dataset.y);
        const size = getNodeWorldSize(node);
        minX = Math.min(minX, x);
        minY = Math.min(minY, y);
        maxX = Math.max(maxX, x + size.width);
        maxY = Math.max(maxY, y + size.height);
      }

      if (!Number.isFinite(minX) || !Number.isFinite(minY) || !Number.isFinite(maxX) || !Number.isFinite(maxY)) {
        selectedNodes.clear();
        selectionBoundsWorld = null;
        applySelectionNodeClasses();
        renderGroupSelectionBox();
        return;
      }

      selectionBoundsWorld = {
        minX,
        minY,
        maxX,
        maxY,
        width: Math.max(0.001, maxX - minX),
        height: Math.max(0.001, maxY - minY)
      };
      renderGroupSelectionBox();
    }

    function setSelectedNodes(nodes) {
      const next = new Set();
      for (const node of nodes) {
        if (node instanceof HTMLElement && world.contains(node)) {
          next.add(node);
        }
      }

      selectedNodes.clear();
      for (const node of next) {
        selectedNodes.add(node);
      }

      applySelectionNodeClasses();
      refreshSelectionBounds();
    }

    function clearSelection() {
      if (selectedNodes.size === 0) {
        selectionBoundsWorld = null;
        renderGroupSelectionBox();
        return;
      }
      selectedNodes.clear();
      applySelectionNodeClasses();
      refreshSelectionBounds();
    }

    function beginMarqueeSelection(event) {
      marqueeSession = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        currentX: event.clientX,
        currentY: event.clientY,
        hasMoved: false
      };
      viewport.setPointerCapture(event.pointerId);
    }

    function updateMarqueeSelection(event) {
      if (!marqueeSession || event.pointerId !== marqueeSession.pointerId) return;
      marqueeSession.currentX = event.clientX;
      marqueeSession.currentY = event.clientY;

      const distance = Math.hypot(
        marqueeSession.currentX - marqueeSession.startX,
        marqueeSession.currentY - marqueeSession.startY
      );
      if (!marqueeSession.hasMoved && distance >= MARQUEE_DRAG_THRESHOLD_PX) {
        marqueeSession.hasMoved = true;
      }
      if (!marqueeSession.hasMoved) return;

      const rect = getScreenRectBetweenPoints(
        marqueeSession.startX,
        marqueeSession.startY,
        marqueeSession.currentX,
        marqueeSession.currentY
      );
      renderMarqueeRect(rect);
      setSelectedNodes(getNodesIntersectingScreenRect(rect));
    }

    function endMarqueeSelection(event) {
      if (!marqueeSession || event.pointerId !== marqueeSession.pointerId) return;
      const didMove = marqueeSession.hasMoved;
      if (viewport.hasPointerCapture(event.pointerId)) {
        viewport.releasePointerCapture(event.pointerId);
      }
      marqueeSession = null;
      hideMarqueeRect();
      if (!didMove) {
        clearSelection();
      }
    }

    function beginGroupTransform(event, mode, captureElement) {
      if (event.button !== 0) return;
      if (selectedNodes.size === 0 || !selectionBoundsWorld) return;

      closeNodeContextMenu();
      cancelCameraAnimation();

      groupTransform = {
        pointerId: event.pointerId,
        mode,
        captureElement,
        startPointer: screenToWorld(event.clientX, event.clientY),
        initialBounds: { ...selectionBoundsWorld },
        nodeSnapshots: Array.from(selectedNodes).map((node) => ({
          node,
          x: Number(node.dataset.x),
          y: Number(node.dataset.y),
          baseFontSize: Number(node.dataset.baseFontSize)
        }))
      };

      captureElement.setPointerCapture(event.pointerId);
      event.preventDefault();
      event.stopPropagation();
    }

    function updateGroupTransform(event) {
      if (!groupTransform || event.pointerId !== groupTransform.pointerId) return;

      const pointer = screenToWorld(event.clientX, event.clientY);
      const dx = pointer.x - groupTransform.startPointer.x;
      const dy = pointer.y - groupTransform.startPointer.y;

      if (groupTransform.mode === "drag") {
        for (const snapshot of groupTransform.nodeSnapshots) {
          setNodePosition(snapshot.node, snapshot.x + dx, snapshot.y + dy, { skipSelectionUpdate: true });
        }
        refreshSelectionBounds();
        return;
      }

      const initialWidth = Math.max(0.001, groupTransform.initialBounds.width);
      const initialHeight = Math.max(0.001, groupTransform.initialBounds.height);
      const nextWidth = Math.max(0.001, initialWidth + dx);
      const nextHeight = Math.max(0.001, initialHeight + dy);
      const scaleX = nextWidth / initialWidth;
      const scaleY = nextHeight / initialHeight;
      const fontScale = Math.sqrt(scaleX * scaleY);

      for (const snapshot of groupTransform.nodeSnapshots) {
        const nextX = groupTransform.initialBounds.minX + (snapshot.x - groupTransform.initialBounds.minX) * scaleX;
        const nextY = groupTransform.initialBounds.minY + (snapshot.y - groupTransform.initialBounds.minY) * scaleY;
        snapshot.node.dataset.baseFontSize = String(
          Math.max(0.001, snapshot.baseFontSize * fontScale)
        );
        setNodePosition(snapshot.node, nextX, nextY, { skipSelectionUpdate: true });
      }

      refreshSelectionBounds();
    }

    function endGroupTransform(event) {
      if (!groupTransform || event.pointerId !== groupTransform.pointerId) return;
      const { captureElement, pointerId } = groupTransform;
      if (captureElement.hasPointerCapture(pointerId)) {
        captureElement.releasePointerCapture(pointerId);
      }
      groupTransform = null;
      refreshSelectionBounds();
      scheduleAutosave();
    }

    function render() {
      for (const node of world.children) {
        renderNode(node);
      }
      renderGroupSelectionBox();
    }

    function screenToWorld(clientX, clientY) {
      return {
        x: (clientX - camera.x) / camera.scale,
        y: (clientY - camera.y) / camera.scale
      };
    }

    function setNodePosition(node, x, y, options = {}) {
      const { skipSelectionUpdate = false } = options;
      node.dataset.x = String(x);
      node.dataset.y = String(y);
      renderNode(node);
      if (!skipSelectionUpdate && selectedNodes.has(node)) {
        refreshSelectionBounds();
      }
    }

    function renderNode(node) {
      const worldX = Number(node.dataset.x);
      const worldY = Number(node.dataset.y);
      const baseFontSize = Number(node.dataset.baseFontSize);
      node.style.left = `${camera.x + worldX * camera.scale}px`;
      node.style.top = `${camera.y + worldY * camera.scale}px`;
      node.style.fontSize = `${baseFontSize * camera.scale}px`;
    }

    function zoomTo(newScale, clientX, clientY) {
      if (!Number.isFinite(newScale) || newScale <= 0) return;
      const worldPoint = screenToWorld(clientX, clientY);
      camera.scale = newScale;
      camera.x = clientX - worldPoint.x * camera.scale;
      camera.y = clientY - worldPoint.y * camera.scale;
      render();
    }

    function selectAllText(node) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(node);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function startEditing(node, selectAll = false) {
      node.classList.add("editing");
      node.contentEditable = "true";
      node.focus();
      if (selectAll) selectAllText(node);
    }

    function stopEditing(node) {
      node.contentEditable = "false";
      node.classList.remove("editing");
    }

    function serializeState() {
      return {
        version: 1,
        camera: {
          x: camera.x,
          y: camera.y,
          scale: camera.scale
        },
        nodes: Array.from(world.children).map((node) => ({
          id: node.dataset.nodeId || "",
          x: Number(node.dataset.x),
          y: Number(node.dataset.y),
          baseFontSize: Number(node.dataset.baseFontSize),
          html: sanitizeNodeHtml(node.innerHTML),
          text: node.textContent || ""
        }))
      };
    }

    function scheduleAutosave() {
      if (suppressAutosave) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState()));
        } catch (error) {
          console.error("Autosave failed:", error);
        }
      }, 120);
    }

    function loadState(state) {
      if (!state || typeof state !== "object") {
        throw new Error("Invalid state file.");
      }

      const nextCamera = state.camera || {};
      const nextNodes = Array.isArray(state.nodes) ? state.nodes : [];

      suppressAutosave = true;
      cancelCameraAnimation();
      closeNodeContextMenu();
      clearSelection();
      hideMarqueeRect();
      marqueeSession = null;
      groupTransform = null;
      world.innerHTML = "";
      nextNodeNumber = 1;

      camera.x = Number.isFinite(Number(nextCamera.x)) ? Number(nextCamera.x) : window.innerWidth / 2;
      camera.y = Number.isFinite(Number(nextCamera.y)) ? Number(nextCamera.y) : window.innerHeight / 2;
      camera.scale = Number.isFinite(Number(nextCamera.scale)) && Number(nextCamera.scale) > 0
        ? Number(nextCamera.scale)
        : 1;

      for (const entry of nextNodes) {
        const x = Number.isFinite(Number(entry.x)) ? Number(entry.x) : 0;
        const y = Number.isFinite(Number(entry.y)) ? Number(entry.y) : 0;
        const text = typeof entry.text === "string" ? entry.text : "";
        const html = typeof entry.html === "string" ? sanitizeNodeHtml(entry.html) : null;
        const id = typeof entry.id === "string" ? entry.id : "";
        const baseFontSize = Number.isFinite(Number(entry.baseFontSize)) && Number(entry.baseFontSize) > 0
          ? Number(entry.baseFontSize)
          : BASE_TEXT_PX / camera.scale;
        createTextNode(x, y, text, baseFontSize, id, html);
      }

      suppressAutosave = false;
      render();
      scheduleAutosave();
    }

    async function requestPersistentStorage() {
      if (!navigator.storage || !navigator.storage.persist) return;
      try {
        await navigator.storage.persist();
      } catch (error) {
        console.error("Could not request persistent storage:", error);
      }
    }

    function downloadState(jsonText) {
      const blob = new Blob([jsonText], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "mindmap.mind.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    async function saveToFile() {
      const jsonText = JSON.stringify(serializeState(), null, 2);
      try {
        if ("showSaveFilePicker" in window) {
          if (!fileHandle) {
            fileHandle = await window.showSaveFilePicker({
              suggestedName: "mindmap.mind.json",
              types: FILE_TYPES
            });
          }

          const writable = await fileHandle.createWritable();
          await writable.write(jsonText);
          await writable.close();
          return;
        }
      } catch (error) {
        if (error && error.name === "AbortError") return;
        console.error("Save failed:", error);
      }

      downloadState(jsonText);
    }

    async function openFromFile() {
      try {
        if ("showOpenFilePicker" in window) {
          const [handle] = await window.showOpenFilePicker({
            multiple: false,
            types: FILE_TYPES
          });
          if (!handle) return;
          fileHandle = handle;

          const file = await handle.getFile();
          const text = await file.text();
          loadState(JSON.parse(text));
          return;
        }
      } catch (error) {
        if (error && error.name === "AbortError") return;
        console.error("Open failed:", error);
        alert("Could not open file.");
        return;
      }

      openFileInput.value = "";
      openFileInput.click();
    }

    function attachNodeHandlers(node) {
      let dragPointerId = null;
      let dragOffsetX = 0;
      let dragOffsetY = 0;

      node.addEventListener("pointerdown", (event) => {
        if (event.button !== 0 || node.classList.contains("editing")) return;
        if (event.target instanceof Element && event.target.closest(".internal-link")) return;
        if (selectedNodes.size > 0 && !selectedNodes.has(node)) {
          clearSelection();
        }
        closeNodeContextMenu();
        cancelCameraAnimation();
        dragPointerId = event.pointerId;
        node.setPointerCapture(dragPointerId);
        const pointer = screenToWorld(event.clientX, event.clientY);
        dragOffsetX = Number(node.dataset.x) - pointer.x;
        dragOffsetY = Number(node.dataset.y) - pointer.y;
        event.preventDefault();
        event.stopPropagation();
      });

      node.addEventListener("pointermove", (event) => {
        if (event.pointerId !== dragPointerId) return;
        const pointer = screenToWorld(event.clientX, event.clientY);
        setNodePosition(node, pointer.x + dragOffsetX, pointer.y + dragOffsetY);
      });

      function endDrag(event) {
        if (event.pointerId !== dragPointerId) return;
        if (node.hasPointerCapture(dragPointerId)) {
          node.releasePointerCapture(dragPointerId);
        }
        dragPointerId = null;
        scheduleAutosave();
      }

      node.addEventListener("pointerup", endDrag);
      node.addEventListener("pointercancel", endDrag);

      node.addEventListener("dblclick", (event) => {
        event.stopPropagation();
        clearSelection();
        startEditing(node);
      });

      node.addEventListener("click", (event) => {
        if (node.classList.contains("editing")) return;
        if (!(event.target instanceof Element)) return;
        const link = event.target.closest(".internal-link");
        if (!link || !node.contains(link)) return;

        const targetId = (link.dataset.targetId || "").trim();
        if (!targetId) return;
        const targetNode = getNodeById(targetId);
        if (!targetNode) {
          alert(`Could not find node "${targetId}".`);
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        focusNodeFullScreen(targetNode);
      });

      node.addEventListener("input", scheduleAutosave);

      node.addEventListener("blur", () => {
        stopEditing(node);
        scheduleAutosave();
      });

      node.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          node.blur();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          node.blur();
        }
      });
    }

    function createTextNode(
      worldX,
      worldY,
      initialText = "",
      baseFontSize = BASE_TEXT_PX / camera.scale,
      preferredId = "",
      initialHtml = null
    ) {
      const node = document.createElement("div");
      node.className = "text-node";
      node.dataset.nodeId = resolveNodeId(preferredId);
      if (typeof initialHtml === "string") {
        node.innerHTML = sanitizeNodeHtml(initialHtml);
      } else {
        node.textContent = initialText;
      }
      normalizeNodeMarkup(node);
      node.contentEditable = "false";

      // Keeps newly-created text visually consistent regardless of current zoom.
      node.dataset.baseFontSize = String(baseFontSize);
      setNodePosition(node, worldX, worldY);
      attachNodeHandlers(node);
      world.appendChild(node);
      scheduleAutosave();
      return node;
    }

    world.addEventListener("contextmenu", (event) => {
      if (!(event.target instanceof Element)) return;
      const node = event.target.closest(".text-node");
      if (!node || !world.contains(node)) return;
      event.preventDefault();
      event.stopPropagation();
      openNodeContextMenu(node, event.clientX, event.clientY);
    });

    copyNodeIdBtn.addEventListener("click", async () => {
      const node = contextMenuNode;
      closeNodeContextMenu();
      if (!node) return;
      const nodeId = node.dataset.nodeId || "";
      try {
        await copyTextToClipboard(nodeId);
      } catch (error) {
        console.error("Copy failed:", error);
        alert("Could not copy node ID.");
      }
    });

    linkSelectionBtn.addEventListener("click", () => {
      const sourceNode = contextMenuNode;
      const selectionRange = contextMenuSelectionRange;
      closeNodeContextMenu();
      if (!sourceNode || !selectionRange) {
        alert("Select a word inside the node first.");
        return;
      }

      const targetNodeIdRaw = window.prompt("Paste target node ID");
      if (targetNodeIdRaw === null) return;

      const targetNodeId = targetNodeIdRaw.trim();
      if (!targetNodeId) {
        alert("Target node ID is required.");
        return;
      }

      const targetNode = getNodeById(targetNodeId);
      if (!targetNode) {
        alert(`Node "${targetNodeId}" does not exist.`);
        return;
      }

      if (targetNode === sourceNode) {
        alert("Choose a different node ID.");
        return;
      }

      try {
        linkSelectionToTarget(sourceNode, selectionRange, targetNodeId);
        normalizeNodeMarkup(sourceNode);
        scheduleAutosave();
      } catch (error) {
        console.error("Linking failed:", error);
        alert("Could not link the selected text.");
      }
    });

    groupSelectionBox.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    groupSelectionBox.addEventListener("pointerdown", (event) => {
      if (event.target === groupSelectionHandle) return;
      beginGroupTransform(event, "drag", groupSelectionBox);
    });

    groupSelectionBox.addEventListener("pointermove", updateGroupTransform);
    groupSelectionBox.addEventListener("pointerup", endGroupTransform);
    groupSelectionBox.addEventListener("pointercancel", endGroupTransform);

    groupSelectionHandle.addEventListener("pointerdown", (event) => {
      beginGroupTransform(event, "resize", groupSelectionHandle);
    });
    groupSelectionHandle.addEventListener("pointermove", updateGroupTransform);
    groupSelectionHandle.addEventListener("pointerup", endGroupTransform);
    groupSelectionHandle.addEventListener("pointercancel", endGroupTransform);

    window.addEventListener("pointerdown", (event) => {
      deactivateEditingNodeOnOutsidePointerDown(event.target);
      if (nodeContextMenu.hidden) return;
      if (event.target instanceof Node && nodeContextMenu.contains(event.target)) return;
      closeNodeContextMenu();
    }, { capture: true });

    viewport.addEventListener("pointerdown", (event) => {
      if (event.button !== 0) return;
      if (event.target !== viewport && event.target !== world) return;
      closeNodeContextMenu();
      cancelCameraAnimation();
      beginMarqueeSelection(event);
      event.preventDefault();
    });

    viewport.addEventListener("pointermove", updateMarqueeSelection);
    viewport.addEventListener("pointerup", endMarqueeSelection);
    viewport.addEventListener("pointercancel", endMarqueeSelection);

    viewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      closeNodeContextMenu();
      cancelCameraAnimation();

      const isZoomGesture = event.ctrlKey || event.metaKey;
      if (isZoomGesture) {
        // Uses native trackpad wheel deltas (including macOS momentum events).
        const factor = Math.exp(-event.deltaY * ZOOM_SENSITIVITY);
        zoomTo(camera.scale * factor, event.clientX, event.clientY);
      } else {
        camera.x -= event.deltaX;
        camera.y -= event.deltaY;
        render();
      }
      scheduleAutosave();
    }, { passive: false });

    let gestureStartScale = camera.scale;
    viewport.addEventListener("gesturestart", (event) => {
      event.preventDefault();
      closeNodeContextMenu();
      cancelCameraAnimation();
      gestureStartScale = camera.scale;
    });

    viewport.addEventListener("gesturechange", (event) => {
      event.preventDefault();
      const centerX = event.clientX || window.innerWidth / 2;
      const centerY = event.clientY || window.innerHeight / 2;
      zoomTo(gestureStartScale * event.scale, centerX, centerY);
      scheduleAutosave();
    });

    viewport.addEventListener("dblclick", (event) => {
      if (event.target !== viewport && event.target !== world) return;
      closeNodeContextMenu();
      clearSelection();
      const point = screenToWorld(event.clientX, event.clientY);
      const node = createTextNode(point.x, point.y);
      const nodeWorldSize = getNodeWorldSize(node);
      setNodePosition(
        node,
        point.x - nodeWorldSize.width / 2,
        point.y - nodeWorldSize.height / 2
      );
      scheduleAutosave();
      startEditing(node);
    });

    openFileInput.addEventListener("change", async () => {
      const file = openFileInput.files && openFileInput.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        fileHandle = null;
        loadState(JSON.parse(text));
      } catch (error) {
        console.error("Open failed:", error);
        alert("Could not parse file.");
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeNodeContextMenu();
      }

      if ((event.key === "Backspace" || event.key === "Delete") && selectedNodes.size > 0) {
        if (isEditableTarget(event.target)) return;
        event.preventDefault();
        closeNodeContextMenu();
        for (const node of Array.from(selectedNodes)) {
          if (world.contains(node)) {
            world.removeChild(node);
          }
        }
        clearSelection();
        scheduleAutosave();
        return;
      }

      const key = event.key.toLowerCase();
      const hasPrimaryModifier = event.metaKey || event.ctrlKey;
      if (!hasPrimaryModifier) return;

      if (key === "s") {
        event.preventDefault();
        void saveToFile();
      }

      if (key === "o") {
        event.preventDefault();
        void openFromFile();
      }
    }, { capture: true });

    window.addEventListener("resize", () => {
      closeNodeContextMenu();
      render();
    });

    function loadFromLocalStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;

      try {
        loadState(JSON.parse(raw));
        return true;
      } catch (error) {
        console.error("Restore failed:", error);
        return false;
      }
    }

    void requestPersistentStorage();
    if (!loadFromLocalStorage()) {
      render();
    }
  </script>
</body>
</html>
